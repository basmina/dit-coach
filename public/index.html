<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DoIt Coach</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }

    header { background: #1a1a1a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a2a; }
    header h1 { font-size: 1.4rem; color: #00e5a0; font-weight: 700; }
    header span { font-size: 0.8rem; color: #888; }

    #goal-bar { background: #1a1a1a; padding: 12px 24px; border-bottom: 1px solid #2a2a2a; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    #goal-bar input { flex: 1; min-width: 200px; background: #2a2a2a; border: 1px solid #3a3a3a; color: #f0f0f0; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; outline: none; }
    #goal-bar button { background: #00e5a0; color: #000; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
    #goals-display { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; }
    .goal-tag { background: #2a2a2a; border: 1px solid #00e5a0; color: #00e5a0; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }

    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; }
    .msg.user { background: #00e5a0; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }
    .msg.coach { background: #1e1e1e; color: #f0f0f0; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #2a2a2a; }
    .msg.typing { color: #888; font-style: italic; }

    #input-area { background: #1a1a1a; padding: 16px 24px; border-top: 1px solid #2a2a2a; display: flex; gap: 12px; }
    #input-area textarea { flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a; color: #f0f0f0; padding: 12px; border-radius: 12px; font-size: 0.95rem; resize: none; height: 48px; outline: none; font-family: inherit; }
    #input-area button { background: #00e5a0; color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; }
    #input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>⚡ DoIt Coach</h1>
  <span>Your personal accountability coach</span>
</header>

<div id="goal-bar">
  <input id="goal-input" type="text" placeholder="Add a goal (e.g. Exercise 30 mins daily)" />
  <button onclick="addGoal()">+ Add Goal</button>
  <div id="goals-display"></div>
</div>

<div id="chat"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="Talk to your coach..." onkeydown="handleKey(event)"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  let messages = [];
  let goals = [];

  // Start with a welcome message
  window.onload = () => {
    addMessage("coach", "Hey! I'm DoIt, your accountability coach. 👋\n\nFirst — what's one thing you *know* you should be doing but keep putting off?\n\nAdd it as a goal above, then let's talk.");
  };

  function addGoal() {
    const input = document.getElementById("goal-input");
    const val = input.value.trim();
    if (!val) return;
    goals.push(val);
    input.value = "";
    renderGoals();
    saveGoals();
  }

  function renderGoals() {
    const display = document.getElementById("goals-display");
    display.innerHTML = goals.map(g => `<span class="goal-tag">🎯 ${g}</span>`).join("");
  }

  async function saveGoals() {
    await fetch("/goals", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ goals })
    });
  }

  function addMessage(role, text) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    btn.disabled = true;
    addMessage("user", text);
    messages.push({ role: "user", content: text });

    const typing = addMessage("coach typing", "Coach is thinking...");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      typing.remove();
      addMessage("coach", data.reply);
      messages.push({ role: "assistant", content: data.reply });
    } catch {
      typing.remove();
      addMessage("coach", "Something went wrong. Try again.");
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
